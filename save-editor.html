<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>龍胤立志傳 存档编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'SimHei', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }

/* Top bar */
.topbar { background: #16213e; padding: 10px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #e94560; }
.topbar h1 { font-size: 20px; color: #e94560; white-space: nowrap; }
.topbar .save-info { color: #aaa; font-size: 13px; flex: 1; }
.topbar button { padding: 6px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-family: inherit; }
.btn-load { background: #0f3460; color: #fff; }
.btn-save { background: #e94560; color: #fff; }
.btn-load:hover { background: #1a4a8a; }
.btn-save:hover { background: #ff6b81; }

/* Tabs */
.tabs { display: flex; background: #16213e; border-bottom: 1px solid #333; }
.tab { padding: 10px 24px; cursor: pointer; color: #888; font-size: 14px; border-bottom: 3px solid transparent; transition: all .2s; }
.tab:hover { color: #ccc; }
.tab.active { color: #e94560; border-bottom-color: #e94560; }

/* Layout */
.main { display: flex; height: calc(100vh - 90px); }
.sidebar { width: 260px; min-width: 260px; background: #16213e; border-right: 1px solid #333; overflow-y: auto; }
.content { flex: 1; overflow-y: auto; padding: 16px; }

/* Sidebar list */
.sidebar-header { padding: 10px 14px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #222; }
.sidebar-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 10px; transition: background .15s; }
.sidebar-item:hover { background: #1a2744; }
.sidebar-item.active { background: #0f3460; border-left: 3px solid #e94560; }
.sidebar-item .name { flex: 1; font-size: 14px; }
.sidebar-item .sub { font-size: 11px; color: #666; }
.sidebar-search { padding: 8px; border-bottom: 1px solid #222; }
.sidebar-search input { width: 100%; padding: 6px 10px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 13px; outline: none; }
.sidebar-search input:focus { border-color: #e94560; }

/* Tags */
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 4px; }
.tag-leader { background: #e94560; color: #fff; }
.tag-dead { background: #555; color: #999; }
.tag-female { background: #9b59b6; color: #fff; }
.tag-male { background: #2980b9; color: #fff; }
.tag-force { background: #27ae60; color: #fff; }
.tag-city { background: #e67e22; color: #fff; }
.tag-village { background: #27ae60; color: #fff; }
.tag-sect { background: #8e44ad; color: #fff; }
.tag-temp { background: #f39c12; color: #333; }

/* Cards */
.card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #222; }
.card-title { font-size: 16px; color: #e94560; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #333; }
.field-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.field { display: flex; flex-direction: column; gap: 2px; }
.field label { font-size: 11px; color: #888; }
.field input, .field select { padding: 5px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 13px; outline: none; }
.field input:focus, .field select:focus { border-color: #e94560; }
.field input[type="number"] { width: 100%; }
.field input[readonly] { color: #666; }

/* Stat bars */
.stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.stat-label { width: 60px; font-size: 12px; color: #aaa; text-align: right; }
.stat-bar-bg { flex: 1; height: 18px; background: #1a1a2e; border-radius: 3px; overflow: hidden; position: relative; }
.stat-bar { height: 100%; border-radius: 3px; transition: width .3s; }
.stat-bar-text { position: absolute; right: 6px; top: 0; line-height: 18px; font-size: 11px; color: #fff; }
.stat-bar.str { background: #e74c3c; }
.stat-bar.agi { background: #2ecc71; }
.stat-bar.int { background: #3498db; }
.stat-bar.con { background: #e67e22; }
.stat-bar.per { background: #9b59b6; }
.stat-bar.cha { background: #1abc9c; }

/* Sub-tabs inside content */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.sub-tab { padding: 5px 14px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; cursor: pointer; font-size: 12px; color: #aaa; transition: all .15s; }
.sub-tab:hover { border-color: #e94560; color: #e0e0e0; }
.sub-tab.active { background: #e94560; color: #fff; border-color: #e94560; }

/* Item table */
.item-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.item-table th { text-align: left; padding: 6px 8px; background: #1a1a2e; color: #888; font-weight: normal; border-bottom: 1px solid #333; }
.item-table td { padding: 6px 8px; border-bottom: 1px solid #222; }
.item-table tr:hover { background: #1a2744; }
.item-table input { width: 70px; padding: 3px 6px; background: #1a1a2e; border: 1px solid #333; border-radius: 3px; color: #e0e0e0; font-size: 12px; }
.rarity-0 { color: #aaa; } .rarity-1 { color: #2ecc71; } .rarity-2 { color: #3498db; }
.rarity-3 { color: #9b59b6; } .rarity-4 { color: #e67e22; } .rarity-5 { color: #e74c3c; }

/* Skill list */
.skill-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-bottom: 1px solid #222; }
.skill-item:hover { background: #1a2744; }
.skill-name { flex: 1; font-size: 13px; }
.skill-lv { font-size: 12px; color: #e94560; }
.skill-lv input { width: 40px; }
.skill-equipped { font-size: 11px; padding: 2px 6px; border-radius: 3px; }
.skill-equipped.yes { background: #27ae60; color: #fff; }
.skill-equipped.no { background: #333; color: #666; }

/* World area */
.area-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: #555; }
.empty .icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #1a1a2e; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #27ae60; color: #fff; border-radius: 6px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #e74c3c; }

/* Hero tags (天赋) */
.tag-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid #222; transition: background .15s; }
.tag-item:hover { background: #1a2744; }
.tag-badge { padding: 3px 10px; border-radius: 12px; font-size: 13px; font-weight: bold; white-space: nowrap; }
.tag-id { font-size: 11px; color: #666; min-width: 50px; }
.tag-time { font-size: 12px; color: #aaa; }
.tag-source { font-size: 12px; color: #888; }
.tag-remove { background: #e74c3c; color: #fff; border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
.tag-remove:hover { background: #c0392b; }
.tag-add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px 0; }
.tag-add-row select, .tag-add-row input { padding: 5px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-size: 13px; outline: none; }
.tag-add-row select:focus, .tag-add-row input:focus { border-color: #e94560; }
.tag-add-row select { max-width: 260px; }
.tag-add-btn { background: #27ae60; color: #fff; border: none; border-radius: 4px; padding: 5px 16px; cursor: pointer; font-size: 13px; }
.tag-add-btn:hover { background: #2ecc71; }

/* Item editor */
.item-row { border-bottom: 1px solid #222; }
.item-row:hover { background: #1a2744; }
.item-summary { display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer; }
.item-summary .item-name { flex: 1; }
.item-edit-btn { background: #0f3460; color: #fff; border: none; border-radius: 4px; padding: 3px 10px; cursor: pointer; font-size: 12px; }
.item-edit-btn:hover { background: #1a4a8a; }
.item-detail { background: #111a30; padding: 12px; border-top: 1px solid #333; display: none; }
.item-detail.open { display: block; }
.stat-entry { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.stat-entry select { padding: 3px 6px; background: #1a1a2e; border: 1px solid #333; border-radius: 3px; color: #e0e0e0; font-size: 12px; max-width: 180px; }
.stat-entry input { width: 80px; padding: 3px 6px; background: #1a1a2e; border: 1px solid #333; border-radius: 3px; color: #e0e0e0; font-size: 12px; }
.stat-entry .stat-remove { background: #e74c3c; color: #fff; border: none; border-radius: 3px; padding: 2px 8px; cursor: pointer; font-size: 11px; }
.stat-entry .stat-remove:hover { background: #c0392b; }
.stat-add-btn { background: #27ae60; color: #fff; border: none; border-radius: 4px; padding: 3px 12px; cursor: pointer; font-size: 12px; margin-top: 4px; }
.stat-add-btn:hover { background: #2ecc71; }
.stat-section-title { font-size: 12px; color: #e94560; margin: 8px 0 4px; }
.stat-section-title:first-child { margin-top: 0; }
.base-stat { color: #e0e0e0; }
.extra-stat { color: #2ecc71; }

/* Sect Grid Map */
.sect-map-wrap { display: flex; gap: 16px; flex-wrap: wrap; }
.sect-map-grid-wrap { flex: 1; min-width: 380px; }
.sect-map-grid { display: inline-grid; gap: 2px; background: #111; border-radius: 8px; padding: 6px; border: 1px solid #333; }
.sect-map-cell {
  width: 42px; height: 42px; border-radius: 4px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: default; position: relative;
  font-size: 10px; transition: all .12s; border: 2px solid transparent; user-select: none;
}
.sect-map-cell.cell-outside { background: transparent; }
.sect-map-cell.cell-wall { background: #2c1a1a; border-color: #5a2020; }
.sect-map-cell.cell-border { background: #1a1a2e; border-color: #222; }
.sect-map-cell.cell-border-white { background: #1e1e30; border-color: #2a2a3a; }
.sect-map-cell.cell-ground { background: #1a2744; border-color: #2a3a5a; cursor: pointer; }
.sect-map-cell.cell-ground-white { background: #1e2748; border-color: #2e3e5e; cursor: pointer; }
.sect-map-cell.cell-ground:hover, .sect-map-cell.cell-ground-white:hover { border-color: #e94560; background: #1f3058; }
.sect-map-cell.cell-road { background: #2a2a1a; border-color: #4a4a2a; cursor: pointer; }
.sect-map-cell.cell-road:hover { border-color: #e94560; background: #353520; }
.sect-map-cell.cell-gate { background: #3a2a1a; border-color: #8a6a2a; }
.sect-map-cell.cell-gate .cell-icon { font-size: 16px; }
.sect-map-cell.cell-wild { background: #1a3020; border-color: #2a4a2a; cursor: pointer; }
.sect-map-cell.cell-wild:hover { border-color: #e94560; }
.sect-map-cell.cell-cleared { background: #1a1a1a; border-color: #333; cursor: pointer; }
.sect-map-cell.cell-cleared:hover { border-color: #e94560; }
.sect-map-cell.cell-foundation-g { background: #2a2a1a; border-color: #3a3a2a; cursor: pointer; }
.sect-map-cell.cell-foundation-w { background: #2a2a2e; border-color: #3a3a3e; cursor: pointer; }
.sect-map-cell.cell-foundation-g:hover, .sect-map-cell.cell-foundation-w:hover { border-color: #e94560; background: #2f2f22; }
.sect-map-cell.has-building { cursor: pointer; }
.sect-map-cell.has-building:hover { border-color: #e94560; transform: scale(1.08); z-index: 2; }
.sect-map-cell.cell-selected { border-color: #e94560 !important; box-shadow: 0 0 8px rgba(233,69,96,0.5); z-index: 3; }
.sect-map-cell .cell-icon { font-size: 15px; line-height: 1; }
.sect-map-cell .cell-lv {
  font-size: 9px; color: #ffd700; font-weight: bold; line-height: 1;
  text-shadow: 0 0 3px rgba(0,0,0,0.8);
}
.sect-map-cell.cell-core { background: linear-gradient(135deg, #3a1a2e, #2a1a3e); border-color: #e94560; }
.sect-map-cell.cell-core .cell-icon { font-size: 18px; }
.sect-map-cell.cell-special { background: linear-gradient(135deg, #1a2a3e, #1a3a2e); border-color: #2ecc71; }

/* Building detail panel */
.bld-detail { flex: 0 0 320px; min-width: 280px; }
.bld-detail .card { position: sticky; top: 0; }
.bld-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bld-detail-icon { font-size: 32px; }
.bld-detail-name { font-size: 18px; color: #e94560; }
.bld-detail-pos { font-size: 12px; color: #666; }
.bld-lv-stars { display: flex; gap: 2px; margin: 8px 0; }
.bld-lv-star { width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; border: 1px solid #333; background: #1a1a2e; transition: all .15s; }
.bld-lv-star:hover { border-color: #e94560; }
.bld-lv-star.active { background: #e94560; border-color: #e94560; color: #fff; }

/* Batch controls */
.batch-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
.batch-bar button { padding: 4px 12px; border: 1px solid #333; background: #1a1a2e; color: #aaa;
  border-radius: 4px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all .15s; }
.batch-bar button:hover { border-color: #e94560; color: #e0e0e0; }
.batch-bar select { padding: 4px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px;
  color: #e0e0e0; font-size: 12px; outline: none; }

/* Legend */
.map-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 11px; color: #888; }
.map-legend-item { display: flex; align-items: center; gap: 4px; }
.map-legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #444; }

/* Building list toggle */
.bld-list-table { margin-top: 12px; }
.bld-list-table .item-table td { font-size: 12px; padding: 4px 6px; }
.bld-list-table .item-table th { font-size: 11px; padding: 4px 6px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚔ 龍胤立志傳 存档编辑器</h1>
  <span class="save-info" id="saveInfo">未加载存档</span>
  <button class="btn-load" onclick="loadFolder()">📂 加载存档</button>
  <button class="btn-save" onclick="saveAll()">💾 保存存档</button>
</div>

<div class="tabs" id="mainTabs">
  <div class="tab active" data-tab="heroes" onclick="switchMainTab('heroes')">🧑‍🤝‍🧑 门派弟子</div>
  <div class="tab" data-tab="tempheroes" onclick="switchMainTab('tempheroes')">👤 江湖人物</div>
  <div class="tab" data-tab="world" onclick="switchMainTab('world')">🗺 天下地图</div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content">
    <div class="empty"><div class="icon">📂</div><p>点击「加载存档」选择一个 SaveSlot 文件夹</p></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script>
// ===== GLOBALS =====
let dirHandle = null;
let saveData = { info: null, heroes: [], tempHeroes: [], save: null };
let currentTab = 'heroes';
let selectedIndex = 0;
let heroSubTab = 'basic';

const ATTRI_NAMES = ['臂力','体质','机略','悟性','根骨','魅力'];
const FIGHT_NAMES = ['拳掌','指法','腿法','暗器','剑法','刀法','长兵','奇门','拳脚'];
const LIVING_NAMES = ['锻造','制木','医术','毒术','织造','巧匠','厨艺','奇术','乐艺'];
const ITEM_TYPES = {0:'装备',1:'丹药',2:'饮食',3:'秘籍',4:'珍宝',5:'材料',6:'马匹'};
const ITEM_SUB_EQUIP = {0:'武器',1:'护甲',2:'头盔',3:'鞋子',4:'饰品'};
const AREA_TYPES = {0:'城镇',1:'村庄',2:'门派'};
const RARITY_NAMES = ['残品','下品','中品','上品','珍品','极品'];

// Type-specific rarity names: item type -> rarity level -> {name, color}
const RARE_LV_BY_TYPE = {
  0: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}, // equip
  1: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}, // dan
  2: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}, // food
  3: {5:'完本',4:'珍本',3:'古本',2:'善本',1:'仿本',0:'残本'}, // book
  4: null, // treasure - no rarity
  5: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}, // material
  6: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}, // horse
  7: {5:'极品',4:'珍品',3:'上品',2:'中品',1:'下品',0:'残品'}  // saddle
};
const RARE_LV_COLORS = {5:'#dc2626',4:'#d97706',3:'#7c3aed',2:'#3b82f6',1:'#059669',0:'#6b7280'};

function getRarityName(itemType, rareLv) {
  const map = RARE_LV_BY_TYPE[itemType];
  if (!map) return ''; // treasure has no rarity
  return map[rareLv] || `品${rareLv}`;
}
function getRarityColor(rareLv) {
  return RARE_LV_COLORS[rareLv] || '#6b7280';
}

const FORCE_MAP = {'-1':'无门派','0':'长乐帮','1':'唐门','2':'药王谷','3':'丐帮','4':'飞龙门','5':'茅山派','6':'铸剑山庄','7':'五毒教','8':'阎罗殿','9':'大隐阁','10':'少林寺','11':'武当派','12':'霸刀门','13':'蓬莱派','14':'峨眉派','15':'崆峒派','16':'神机门','17':'霹雳堂','18':'金刚密宗','19':'天山派','20':'聚义门','21':'黄河帮','22':'八卦门','23':'海沙帮','24':'铁掌帮','25':'仙霞派','26':'巨鲸帮','27':'金龙帮','28':'青城派','29':'伏牛派'};
const FORCE_LV_CN = {6:'掌门',5:'副掌门',4:'长老',3:'亲传弟子',2:'正式弟子',1:'入门弟子',0:'外门弟子'};

function getForceColor(forceId) {
  const fc = (typeof GameData !== 'undefined' && GameData.FORCE_COLORS) ? GameData.FORCE_COLORS[String(forceId)] : null;
  return fc ? fc.color : '#6b7280';
}
const NATURE_NAMES = ['纯粹','固执','稳重','忠厚','简单','灵活','潇洒','轻佻','算计','叛逆'];
const GOVERN_LV_NAMES = {0:'九品壮班',1:'八品衙役',2:'七品捕头',3:'六品县尉',4:'五品团练推官',5:'四品节察判官',6:'三品巡按御史',7:'二品监察御史',8:'二品侍御史',9:'一品御史中丞',10:'一品御史大夫'};

const ITEM_LV = {
  6:{name:'绝世',color:'#dc2626'},5:{name:'绝世',color:'#dc2626'},
  4:{name:'顶级/完美',color:'#d97706',skillName:'顶级',itemName:'完美'},
  3:{name:'秘传/精良',color:'#7c3aed',skillName:'秘传',itemName:'精良'},
  2:{name:'上乘/优质',color:'#3b82f6',skillName:'上乘',itemName:'优质'},
  1:{name:'进阶/普通',color:'#059669',skillName:'进阶',itemName:'普通'},
  0:{name:'基础/劣质',color:'#6b7280',skillName:'基础',itemName:'劣质'}
};

let SKILL_MAP = {}; // from GameData

let SKILL_FORCE_MAP = {};
let SKILL_DESC_MAP = {};
let SKILLS_DATA = [];

function initSkillMap() {
  if (typeof GameData !== 'undefined' && GameData.SKILL_ID_TO_NAME) {
    SKILL_MAP = GameData.SKILL_ID_TO_NAME;
    console.log('[SkillMap] Loaded', Object.keys(SKILL_MAP).length, 'skills from GameData');
  }
  fetch('skills_data.json').then(r => r.ok ? r.json() : []).then(data => {
    SKILLS_DATA = data;
    data.forEach(sk => {
      SKILL_FORCE_MAP[sk.id] = sk['所属势力'] || '江湖';
      if (sk['描述']) SKILL_DESC_MAP[sk.id] = sk['描述'];
    });
    console.log('[SkillData] Loaded', data.length, 'skills from skills_data.json');

// Color tiers for tags: green(1-tier), blue(2-tier), orange(3-tier), buff(328+), negative debuff
function getTagColor(id) {
  // Buff/debuff range (328+)
  if (id >= 328 && id <= 355) return '#f39c12'; // buff - yellow
  if (id >= 356 && id <= 373) return '#1abc9c'; // mechanical
  if (id >= 374) return '#e94560'; // special/ending
  // Negative traits (odd groups starting from 127)
  const negatives = [127,128,129,133,134,135,139,140,141,145,146,147,151,152,153,157,158,159,163,164,165,169,170,171,175,176,177,181,182,183,187,188,189,193,194,195,199,200,201,205,206,207,211,212,213,217,218,219,343,344,345,346,347,348,349,350,351,352,353,367,368,369,370,375,389];
  if (negatives.includes(id)) return '#e74c3c'; // red for negative
  // Tier system: within each group of 3, index 0=green, 1=blue, 2=orange
  const mod = id % 3;
  if (mod === 0) return '#2ecc71'; // green
  if (mod === 1) return '#3498db'; // blue
  return '#e67e22'; // orange
}

async function loadFolder() {

    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    console.log('[Load] Directory selected:', dirHandle.name);

    // List all files in the directory

    for await (const entry of dirHandle.values()) {
      console.log(`  [${entry.kind}] ${entry.name}`);
    }

    await readSaveFiles();
    toast('存档加载成功');
  } catch(e) {
    console.error('[Load] FAILED:', e);
    console.error('[Load] Error name:', e.name, 'message:', e.message);
    console.error('[Load] Stack:', e.stack);
    if (e.name !== 'AbortError') toast('加载失败: ' + e.message, true);

async function readFile(name) {
  try {
    console.log(`[ReadFile] Getting handle for: "${name}"`);
    const fh = await dirHandle.getFileHandle(name);
    console.log(`[ReadFile] Got handle, reading file: "${name}"`);
    const file = await fh.getFile();
    console.log(`[ReadFile] File "${name}" size: ${file.size} bytes, type: "${file.type}"`);
    const text = await file.text();
    console.log(`[ReadFile] File "${name}" text length: ${text.length}, first 200 chars:`, text.substring(0, 200));
    return text;
  } catch(e) {
    console.error(`[ReadFile] FAILED to read "${name}":`, e);
    throw e;
  }
}

async function writeFile(name, content) {
  const fh = await dirHandle.getFileHandle(name, { create: true });
  const wr = await fh.createWritable();
  await wr.write(content);
  await wr.close();
}

async function backupFiles() {
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
  const files = ['Hero', 'TempHero', 'Save', 'Info'];
  const backupDir = await dirHandle.getDirectoryHandle('backup', { create: true });
  const tsDir = await backupDir.getDirectoryHandle(timestamp, { create: true });
  let backed = 0;
  for (const name of files) {
    try {
      const fh = await dirHandle.getFileHandle(name);
      const file = await fh.getFile();
      const content = await file.text();
      const backupFh = await tsDir.getFileHandle(name, { create: true });
      const wr = await backupFh.createWritable();
      await wr.write(content);
      await wr.close();
      backed++;
    } catch(e) { /* file might not exist yet, skip */ }
  }
  return { backed, timestamp };
}

async function saveAll() {
  if (!dirHandle) { toast('请先加载存档', true); return; }
  try {
    const { backed, timestamp } = await backupFiles();
    console.log(`[Backup] ${backed} files backed up to backup/ with timestamp ${timestamp}`);
    await writeFile('Hero', JSON.stringify(saveData.heroes));
    await writeFile('TempHero', JSON.stringify(saveData.tempHeroes));
    await writeFile('Save', JSON.stringify(saveData.save));
    await writeFile('Info', JSON.stringify(saveData.info));
    toast(`存档保存成功 (已备份 ${backed} 个文件 → backup/${timestamp})`);
  } catch(e) { toast('保存失败: ' + e.message, true); }
}

  heroSubTab = 'basic';
  document.querySelectorAll('#mainTabs .tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === tab));
  renderSidebar();
  renderContent();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (!dirHandle) { sb.innerHTML = ''; return; }

  let items = [];
  if (currentTab === 'heroes') items = saveData.heroes;
  else if (currentTab === 'tempheroes') items = saveData.tempHeroes;
  else if (currentTab === 'world') items = (saveData.save?.Areas || []);

  let html = `<div class="sidebar-search"><input type="text" placeholder="搜索..." oninput="filterSidebar(this.value)"></div>`;

  if (currentTab === 'world') {
    html += `<div class="sidebar-header">地区 (${items.length})</div>`;
    items.forEach((a, i) => {
      const aType = getAreaType(a.areaID);
      const tagClass = aType === 0 ? 'tag-city' : aType === 1 ? 'tag-village' : 'tag-sect';
      const tagText = aType === 0 ? '城' : aType === 1 ? '村' : '派';
      html += `<div class="sidebar-item${i===selectedIndex?' active':''}" data-idx="${i}" data-name="${a.areaName}" onclick="selectItem(${i})">
        <span class="name">${a.areaName}</span>
        <span class="tag ${tagClass}">${tagText}</span>
      </div>`;
    });
  } else {
    const label = currentTab === 'heroes' ? '弟子' : '江湖人物';
    html += `<div class="sidebar-header">${label} (${items.length})</div>`;
    items.forEach((h, i) => {
      if (!h) return; // skip null entries
      let tags = '';
      const forceLvName = FORCE_LV_CN[h.heroForceLv];
      if (forceLvName && h.belongForceID >= 0) {
        const displayRank = h.isLeader ? '掌门' : forceLvName;
        const displayLv = h.isLeader ? 6 : h.heroForceLv;
        const flvColor = (ITEM_LV[displayLv]||{}).color || '#6b7280';
        tags += `<span class="tag" style="background:${flvColor};color:#fff">${displayRank}</span>`;
      }
      if (h.dead) tags += '<span class="tag tag-dead">已故</span>';
      tags += `<span class="tag ${h.isFemale?'tag-female':'tag-male'}">${h.isFemale?'♀':'♂'}</span>`;
      if (currentTab === 'tempheroes') tags += '<span class="tag tag-temp">临</span>';
      const sub = FORCE_MAP[h.belongForceID] || (h.belongForceID >= 0 ? `势力${h.belongForceID}` : '无门派');
      const forceColor = getForceColor(h.belongForceID);
      html += `<div class="sidebar-item${i===selectedIndex?' active':''}" data-idx="${i}" data-name="${h.heroName}" data-id="${h.heroID}" onclick="selectItem(${i})">
        <span style="font-size:11px;color:#555;min-width:30px">${h.heroID}</span>
        <span class="name">${h.heroName}${h.heroNickName ? `<span style="font-size:10px;color:#888;margin-left:4px">${h.heroNickName}</span>` : ''}</span>
        <span class="sub" style="color:${forceColor}">${sub}</span>
        ${tags}
      </div>`;
    });
  }
  sb.innerHTML = html;
}

function filterSidebar(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const name = (el.dataset.name||'').toLowerCase();
    const id = el.dataset.id || '';
    el.style.display = (name.includes(q) || id.includes(q)) ? '' : 'none';
  });
}

function selectItem(idx) {
  selectedIndex = idx;
  heroSubTab = currentTab === 'world' ? 'area' : 'basic';
  openItemIdx = -1;
  openSkillIdx = -1;
  window._selectedMapTile = -1;
  document.querySelectorAll('.sidebar-item').forEach((el,i) =>
    el.classList.toggle('active', parseInt(el.dataset.idx) === idx));
  renderContent();
}

// ===== CONTENT =====
function renderContent() {
  const c = document.getElementById('content');
  if (!dirHandle) { c.innerHTML = '<div class="empty"><div class="icon">📂</div><p>点击「加载存档」选择一个 SaveSlot 文件夹</p></div>'; return; }

  if (currentTab === 'world') renderArea(c);
  else renderHero(c);
}

// ===== HERO RENDER =====
function renderHero(c) {
  const list = currentTab === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  if (!list.length) { c.innerHTML = '<div class="empty"><p>无数据</p></div>'; return; }
  const h = list[selectedIndex];
  if (!h) { c.innerHTML = '<div class="empty"><p>该位置数据为空 (null)</p></div>'; return; }

  const tabs = [
    {id:'basic',label:'基本信息'},{id:'attri',label:'属性'},
    {id:'tags',label:'天赋'},
    {id:'skills',label:'武学'},{id:'items',label:'物品'},
    {id:'relations',label:'关系'}
  ];

  let html = `<div class="sub-tabs">${tabs.map(t =>
    `<div class="sub-tab${heroSubTab===t.id?' active':''}" onclick="heroSubTab='${t.id}';renderContent()">${t.label}</div>`
  ).join('')}</div>`;

  const src = currentTab === 'heroes' ? 'heroes' : 'tempHeroes';

  if (heroSubTab === 'basic') html += renderHeroBasic(h, src);
  else if (heroSubTab === 'attri') html += renderHeroAttri(h, src);
  else if (heroSubTab === 'tags') html += renderHeroTags(h, src);
  else if (heroSubTab === 'skills') html += renderHeroSkills(h, src);
  else if (heroSubTab === 'items') html += renderHeroItems(h, src);
  else if (heroSubTab === 'relations') html += renderHeroRelations(h, src);

  c.innerHTML = html;
}

// When base changes, also adjust total by the same delta
function updateBase(basePath, totalPath, oldBase, newBaseStr) {
  const newBase = parseFloat(newBaseStr) || 0;
  const delta = newBase - oldBase;
  setVal(basePath, newBase);
  // Read current total and add delta
  try {
    const currentTotal = new Function('saveData', 'return ' + totalPath)(saveData);
    setVal(totalPath, (currentTotal || 0) + delta);
  } catch(e) { console.error('updateBase error:', e); }
}

function isBuffTag(id) {
  return id >= 328;
}

function renderHeroTags(h, src) {
  const p = heroPath(src);
  const tags = h.heroTagData || [];
  const talentTags = tags.filter(t => !isBuffTag(t.tagID));
  const buffTags = tags.filter(t => isBuffTag(t.tagID));

  let html = `<div class="card"><div class="card-title">天赋 (${talentTags.length}) — 总点数: <input type="number" step="any" value="${r2(h.heroTagPoint || 0)}" style="width:80px;padding:2px 6px;background:#1a1a2e;border:1px solid #333;color:#e94560;border-radius:3px;font-size:14px" onchange="setVal('${p}.heroTagPoint',parseFloat(this.value)||0)"></div>`;

  // Add talent
  html += `<div class="tag-add-row">
    <select id="addTagSelect">
      <option value="">— 选择天赋 —</option>`;
  const talentIds = Object.keys(TAG_NAMES).map(Number).filter(id => !isBuffTag(id)).sort((a,b) => a - b);
  talentIds.forEach(id => {
    const existing = tags.some(t => t.tagID === id);
    html += `<option value="${id}" ${existing?'disabled':''}>${id}: ${TAG_NAMES[id]}${existing?' (已有)':''}</option>`;
  });
  html += `</select>
    <input id="addTagTime" type="number" value="-1" style="width:80px" title="持续时间 (-1=永久)">
    <span style="font-size:11px;color:#666">(-1=永久)</span>
    <button class="tag-add-btn" onclick="addTag('${src}')">+ 添加天赋</button>
  </div>`;

  if (!talentTags.length) {
    html += '<p style="color:#666;padding:8px">无天赋</p>';
  } else {
    talentTags.forEach(tag => {
      const i = tags.indexOf(tag);
      html += renderTagRow(tag, i, p, src);
    });
  }
  html += `</div>`;

  // Buff section
  html += `<div class="card"><div class="card-title">状态/Buff (${buffTags.length})</div>`;

  html += `<div class="tag-add-row">
    <select id="addBuffSelect">
      <option value="">— 选择状态 —</option>`;
  const buffIds = Object.keys(TAG_NAMES).map(Number).filter(id => isBuffTag(id)).sort((a,b) => a - b);
  buffIds.forEach(id => {
    const existing = tags.some(t => t.tagID === id);
    html += `<option value="${id}" ${existing?'disabled':''}>${id}: ${TAG_NAMES[id]}${existing?' (已有)':''}</option>`;
  });
  html += `</select>
    <input id="addBuffTime" type="number" value="-1" style="width:80px" title="持续时间 (-1=永久)">
    <span style="font-size:11px;color:#666">(-1=永久)</span>
    <button class="tag-add-btn" onclick="addBuff('${src}')">+ 添加状态</button>
  </div>`;

  if (!buffTags.length) {
    html += '<p style="color:#666;padding:8px">无状态</p>';
  } else {
    buffTags.forEach(tag => {
      const i = tags.indexOf(tag);
      html += renderTagRow(tag, i, p, src);
    });
  }
  html += `</div>`;

  return html;
}

function renderTagRow(tag, i, p, src) {
  const name = TAG_NAMES[tag.tagID] ?? `未知(${tag.tagID})`;
  const color = getTagColor(tag.tagID);
  const timeText = tag.leftTime === -1 ? '永久' : `${r2(tag.leftTime)} 天`;
  const sourceText = tag.sourceHero != null ? heroLink(tag.sourceHero) : '';

  return `<div class="tag-item">
    <span class="tag-id">#${tag.tagID}</span>
    <span class="tag-badge" style="background:${color};color:#fff">${name}</span>
    <span class="tag-time" style="flex:1">
      ⏱ <input type="number" step="any" value="${tag.leftTime}" style="width:70px;padding:2px 6px;background:#1a1a2e;border:1px solid #333;border-radius:3px;color:#e0e0e0;font-size:12px"
        onchange="setVal('${p}.heroTagData[${i}].leftTime',parseFloat(this.value));renderContent()"
        title="持续时间 (-1=永久)"> <span style="font-size:11px;color:#555">${timeText}</span>
    </span>
    ${sourceText ? `<span class="tag-source">来源: ${sourceText}</span>` : ''}
    <button class="tag-remove" onclick="removeTag('${src}',${i})">✕ 移除</button>
  </div>`;
}

function addTag(src) {
  const sel = document.getElementById('addTagSelect');
  const timeInput = document.getElementById('addTagTime');
  const tagID = parseInt(sel.value);
  if (isNaN(tagID)) { toast('请选择一个天赋', true); return; }
  const leftTime = parseFloat(timeInput.value) || -1;
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h) return;
  if (!h.heroTagData) h.heroTagData = [];
  h.heroTagData.push({ tagID: tagID, leftTime: leftTime, sourceHero: null });
  toast(`已添加: ${TAG_NAMES[tagID] || tagID}`);
  renderContent();
}

function addBuff(src) {
  const sel = document.getElementById('addBuffSelect');
  const timeInput = document.getElementById('addBuffTime');
  const tagID = parseInt(sel.value);
  if (isNaN(tagID)) { toast('请选择一个状态', true); return; }
  const leftTime = parseFloat(timeInput.value) || -1;
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h) return;
  if (!h.heroTagData) h.heroTagData = [];
  h.heroTagData.push({ tagID: tagID, leftTime: leftTime, sourceHero: null });
  toast(`已添加: ${TAG_NAMES[tagID] || tagID}`);
  renderContent();
}

function removeTag(src, idx) {
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h || !h.heroTagData) return;
  const removed = h.heroTagData.splice(idx, 1)[0];
  toast(`已移除: ${TAG_NAMES[removed?.tagID] || removed?.tagID}`);
  renderContent();
}

let openSkillIdx = -1;
let skillFilterType = 'all';
let skillFilterLv = 'all';
let skillFilterForce = 'all';

function renderHeroSkills(h, src) {
  const p = heroPath(src);
  const skills = h.kungfuSkills || [];

  // Collect available types and levels for filters
  const availTypes = new Set();
  const availLvs = new Set();
  skills.forEach(sk => {
    availTypes.add(getSkillType(sk.skillID));
    const d = SKILL_MAP[String(sk.skillID)];
    if (d) availLvs.add(d[1]);
  });

  let html = `<div class="card"><div class="card-title">武学 (${skills.length})</div>`;

  // Filters
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    <select onchange="skillFilterType=this.value;renderContent()" style="padding:4px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px">
      <option value="all" ${skillFilterType==='all'?'selected':''}>全部类型</option>`;
  ['内功','轻功','绝技','拳掌','剑法','刀法','长兵','奇门','射术'].forEach(t => {
    if (availTypes.has(t)) html += `<option value="${t}" ${skillFilterType===t?'selected':''}>${t}</option>`;
  });
  // any extra types not in the standard list
  availTypes.forEach(t => {
    if (!['内功','轻功','绝技','拳掌','剑法','刀法','长兵','奇门','射术'].includes(t))
      html += `<option value="${t}" ${skillFilterType===t?'selected':''}>${t}</option>`;
  });
  html += `</select>
    <select onchange="skillFilterLv=this.value;renderContent()" style="padding:4px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px">
      <option value="all" ${skillFilterLv==='all'?'selected':''}>全部品级</option>`;
  [5,4,3,2,1,0].forEach(lv => {
    if (availLvs.has(lv)) {
      const info = ITEM_LV[lv];
      const label = info ? (info.skillName || info.name) : `Lv${lv}`;
      html += `<option value="${lv}" ${skillFilterLv===String(lv)?'selected':''}>${label}</option>`;
    }
  });
  html += `</select>
    <select onchange="skillFilterForce=this.value;renderContent()" style="padding:4px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px">
      <option value="all" ${skillFilterForce==='all'?'selected':''}>全部门派</option>
      <option value="江湖" ${skillFilterForce==='江湖'?'selected':''}>江湖 (无门派)</option>`;
  // Collect available forces from hero's skills
  const availForces = new Set();
  skills.forEach(sk => { const f = getSkillForce(sk.skillID); if (f !== '江湖') availForces.add(f); });
  [...availForces].sort().forEach(f => {
    html += `<option value="${f}" ${skillFilterForce===f?'selected':''}>${f}</option>`;
  });
  html += `</select></div>`;

  // Add skill row
  html += `<div class="tag-add-row">
    <input id="addSkillSearch" type="text" placeholder="搜索武学名称或ID..." oninput="filterSkillOptions(this.value)" style="width:160px">
    <select id="addSkillSelect" style="max-width:280px">
      <option value="">— 选择武学 —</option>`;
  const existingIds = new Set(skills.map(s => s.skillID));
  const sortedSkillIds = Object.keys(SKILL_MAP).map(Number).sort((a,b) => a - b);
  sortedSkillIds.forEach(id => {
    const d = SKILL_MAP[id];
    if (!d) return;
    if (skillFilterType !== 'all' && d[0] !== skillFilterType) return;
    if (skillFilterLv !== 'all' && d[1] !== parseInt(skillFilterLv)) return;
    const sf = getSkillForce(id);
    if (skillFilterForce !== 'all' && sf !== skillFilterForce) return;
    const owned = existingIds.has(id);
    const lvInfo = ITEM_LV[d[1]];
    const lvLabel = lvInfo ? (lvInfo.skillName || lvInfo.name) : '';
    html += `<option value="${id}" data-name="${d[2]}" ${owned?'disabled':''}>${id}: [${d[0]}] ${lvLabel} ${d[2]}${owned?' (已有)':''}</option>`;
  });
  html += `</select>
    <input id="addSkillLv" type="number" value="1" min="1" max="10" style="width:60px" title="初始等级">
    <button class="tag-add-btn" onclick="addSkill('${src}')">+ 添加武学</button>
  </div>`;

  if (!skills.length) {
    html += '<p style="color:#666;padding:8px">无武学</p></div>';
    return html;
  }

  // Determine slot roles
  const slotRoles = {};
  if (h.internalSkillSaveRecord >= 0) slotRoles[h.internalSkillSaveRecord] = '内功';
  if (h.dodgeSkillSaveRecord >= 0) slotRoles[h.dodgeSkillSaveRecord] = '轻功';
  if (h.uniqueSkillSaveRecord >= 0) slotRoles[h.uniqueSkillSaveRecord] = '绝技';
  (h.attackSkillSaveRecord || []).forEach((idx, slot) => { if (idx >= 0) slotRoles[idx] = `招式${slot+1}`; });

  // Filter and group
  const filtered = [];
  skills.forEach((sk, i) => {
    const type = getSkillType(sk.skillID);
    const d = SKILL_MAP[String(sk.skillID)];
    const skLv = d ? d[1] : -1;
    if (skillFilterType !== 'all' && type !== skillFilterType) return;
    if (skillFilterLv !== 'all' && skLv !== parseInt(skillFilterLv)) return;
    const skForce = getSkillForce(sk.skillID);
    if (skillFilterForce !== 'all' && skForce !== skillFilterForce) return;
    filtered.push({sk, i, type, force: skForce});
  });

  const grouped = {};
  filtered.forEach(entry => {
    if (!grouped[entry.type]) grouped[entry.type] = [];
    grouped[entry.type].push(entry);
  });

  html += `<div style="font-size:11px;color:#555;margin-bottom:6px">显示 ${filtered.length} / ${skills.length} 个武学</div>`;

  for (const [type, entries] of Object.entries(grouped)) {
    html += `<div style="margin-top:8px;margin-bottom:4px;font-size:12px;color:#888;border-bottom:1px solid #222;padding-bottom:4px">${type} (${entries.length})</div>`;
    entries.forEach(({sk, i}) => {
      const name = getSkillName(sk.skillID);
      const lvName = getSkillLvName(sk.skillID);
      const lvColor = getSkillLvColor(sk.skillID);
      const displayName = name || '未知武学';
      const isOpen = openSkillIdx === i;
      const role = slotRoles[i];
      const sp = `${p}.kungfuSkills[${i}]`;
      const skForce = getSkillForce(sk.skillID);
      const skDesc = getSkillDesc(sk.skillID);
      const forceLabel = skForce !== '江湖' ? skForce : '';
      const skForceColor = forceLabel ? getForceColor(Object.entries(FORCE_MAP).find(([k,v])=>v===skForce)?.[0] ?? -1) : '';

      html += `<div class="item-row">
        <div class="item-summary" onclick="toggleSkillEdit(${i})">
          <span style="color:${lvColor};font-size:11px;min-width:36px">${lvName}</span>
          <span style="color:${lvColor};flex:1">${displayName}</span>
          ${forceLabel ? `<span style="font-size:10px;color:${skForceColor}">${forceLabel}</span>` : ''}
          <span style="font-size:11px;color:#555">#${sk.skillID}</span>
          ${role ? `<span class="tag tag-leader">${role}</span>` : ''}
          <span class="skill-equipped ${sk.equiped?'yes':'no'}">${sk.equiped?'装备中':'未装备'}</span>
          <span style="font-size:12px;color:#e94560">Lv${sk.lv}</span>
          <button class="item-edit-btn">${isOpen ? '▲ 收起' : '▼ 编辑'}</button>
          <button class="tag-remove" onclick="event.stopPropagation();removeSkill('${src}',${i})">✕</button>
        </div>`;

      if (isOpen) {
        html += `<div class="item-detail open">`;
        if (skDesc) html += `<div style="font-size:12px;color:#888;margin-bottom:8px;line-height:1.5">${skDesc}</div>`;
        html += `<div class="field-grid" style="margin-bottom:10px">
          ${field('等级', 'number', sk.lv, `${sp}.lv`)}
          ${field('实战经验', 'number', r2(sk.fightExp), `${sp}.fightExp`)}
          ${field('读书经验', 'number', r2(sk.bookExp), `${sp}.bookExp`)}
          ${field('装备', 'select', sk.equiped, `${sp}.equiped`, [{v:true,l:'是'},{v:false,l:'否'}])}
          ${field('装备总加成', 'number', r2(sk.equipUseSpeAddValue), `${sp}.equipUseSpeAddValue`)}
          ${field('伤害加成', 'number', r2(sk.damageUseSpeAddValue), `${sp}.damageUseSpeAddValue`)}
          ${field('自身加成', 'number', r2(sk.selfUseSpeAddValue), `${sp}.selfUseSpeAddValue`)}
          ${field('敌方加成', 'number', r2(sk.enemyUseSpeAddValue), `${sp}.enemyUseSpeAddValue`)}
        </div>`;

        // skillMaxPracticeExpData — max practice exp & max read exp per book level
        const expDataArr = h.skillMaxPracticeExpData || [];
        let expIdx = expDataArr.findIndex(e => e.skillID === sk.skillID);
        if (expIdx === -1) {
          expDataArr.push({ skillID: sk.skillID, maxPracticeExp: 0, maxReadExp: [0,0,0,0,0,0] });
          expIdx = expDataArr.length - 1;
        }
        const expEntry = expDataArr[expIdx];
        const ep = `${p}.skillMaxPracticeExpData[${expIdx}]`;
        const bookLvNames = ['残本','仿本','善本','古本','珍本','完本'];
        const bookLvColors = ['#6b7280','#059669','#3b82f6','#7c3aed','#d97706','#dc2626'];
        html += `<div class="stat-section-title" style="color:#f1c40f">最高修炼/读书经验</div>`;
        html += `<div class="field-grid" style="margin-bottom:6px">
          ${field('最高修炼经验', 'number', r2(expEntry.maxPracticeExp), `${ep}.maxPracticeExp`)}
        </div>`;
        html += `<div style="font-size:11px;color:#888;margin:4px 0">最高读书经验 (按秘籍品级)</div>`;
        html += `<div class="field-grid">`;
        for (let bl = 0; bl < 6; bl++) {
          const val = (expEntry.maxReadExp && expEntry.maxReadExp[bl]) ? r2(expEntry.maxReadExp[bl]) : 0;
          html += `<div class="field"><label style="color:${bookLvColors[bl]}">${bookLvNames[bl]}</label><input type="number" value="${val}" onchange="setVal('${ep}.maxReadExp[${bl}]',parseFloat(this.value))"></div>`;
        }
        html += `</div>`;

        // speEquipData — passive equip bonuses
        const equipStats = sk.speEquipData?.heroSpeAddData;
        if (equipStats && Object.keys(equipStats).length) {
          html += `<div class="stat-section-title">装备被动 (speEquipData)</div>`;
          html += renderStatEditor(equipStats, `${sp}.speEquipData.heroSpeAddData`, i, 'skEquip');
        } else {
          html += `<div class="stat-section-title">装备被动 (speEquipData)</div>`;
          html += renderStatEditor({}, `${sp}.speEquipData.heroSpeAddData`, i, 'skEquip');
        }

        // speUseData — active use bonuses
        const useStats = sk.speUseData?.heroSpeAddData;
        html += `<div class="stat-section-title" style="color:#2ecc71">使用效果 (speUseData)</div>`;
        html += renderStatEditor(useStats || {}, `${sp}.speUseData.heroSpeAddData`, i, 'skUse');

        // extraAddData
        const extraStats = sk.extraAddData?.heroSpeAddData;
        if (extraStats && Object.keys(extraStats).length) {
          html += `<div class="stat-section-title" style="color:#e67e22">额外加成 (extraAddData)</div>`;
          html += renderStatEditor(extraStats, `${sp}.extraAddData.heroSpeAddData`, i, 'skExtra');
        }

        html += `</div>`; // close item-detail
      }
      html += `</div>`; // close item-row
    });
  }
  html += `</div>`;
  return html;
}

function toggleSkillEdit(idx) {
  openSkillIdx = openSkillIdx === idx ? -1 : idx;
  renderContent();
}

function addSkill(src) {
  const sel = document.getElementById('addSkillSelect');
  const lvInput = document.getElementById('addSkillLv');
  const skillID = parseInt(sel.value);
  if (isNaN(skillID)) { toast('请选择一个武学', true); return; }
  const lv = parseInt(lvInput.value) || 1;
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h) return;
  if (!h.kungfuSkills) h.kungfuSkills = [];
  h.kungfuSkills.push({
    skillID: skillID,
    lv: lv,
    fightExp: 0.0,
    bookExp: 0.0,
    equiped: false,
    isNew: true,
    belongHeroID: h.heroID,
    speEquipData: { heroSpeAddData: {} },
    equipUseSpeAddValue: 0.0,
    speUseData: { heroSpeAddData: {} },
    damageUseSpeAddValue: 0.0,
    selfUseSpeAddValue: 0.0,
    enemyUseSpeAddValue: 0.0,
    extraAddData: { heroSpeAddData: {} },
    maxManaChanged: false
  });
  const name = getSkillName(skillID) || skillID;
  toast(`已添加武学: ${name}`);
  renderContent();
}

function removeSkill(src, idx) {
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h || !h.kungfuSkills) return;
  const removed = h.kungfuSkills[idx];
  const name = removed ? (getSkillName(removed.skillID) || removed.skillID) : idx;
  h.kungfuSkills.splice(idx, 1);
  // Fix slot references that point to indices
  if (h.internalSkillSaveRecord === idx) h.internalSkillSaveRecord = -1;
  else if (h.internalSkillSaveRecord > idx) h.internalSkillSaveRecord--;
  if (h.dodgeSkillSaveRecord === idx) h.dodgeSkillSaveRecord = -1;
  else if (h.dodgeSkillSaveRecord > idx) h.dodgeSkillSaveRecord--;
  if (h.uniqueSkillSaveRecord === idx) h.uniqueSkillSaveRecord = -1;
  else if (h.uniqueSkillSaveRecord > idx) h.uniqueSkillSaveRecord--;
  if (h.attackSkillSaveRecord) {
    h.attackSkillSaveRecord = h.attackSkillSaveRecord.map(v => v === idx ? -1 : (v > idx ? v - 1 : v));
  }
  openSkillIdx = -1;
  toast(`已移除武学: ${name}`);
  renderContent();
}

function filterSkillOptions(q) {
  q = q.toLowerCase();
  const sel = document.getElementById('addSkillSelect');
  if (!sel) return;
  Array.from(sel.options).forEach(opt => {
    if (!opt.value) return; // skip placeholder
    const name = (opt.dataset.name || '').toLowerCase();
    const id = opt.value;
    opt.style.display = (name.includes(q) || id.includes(q)) ? '' : 'none';
  });
}

let openItemIdx = -1;
let itemSource = 'bag'; // 'bag', 'self', 'govern'
let itemSortKey = 'none';
let itemSortAsc = true;
let itemFilterTypes = new Set(); // empty = all
let itemFilterLvs = new Set();  // empty = all
let itemFilterRare = new Set(); // empty = all

function toggleItemFilter(set, val) {
  if (set.has(val)) set.delete(val); else set.add(val);
  openItemIdx = -1;
  renderContent();
}
function clearItemFilters() {
  itemFilterTypes.clear();
  itemFilterLvs.clear();
  itemFilterRare.clear();
  openItemIdx = -1;
  renderContent();
}

function renderHeroItems(h, src) {
  const p = heroPath(src);
  const isPlayerHero = h.heroID === 0;

  // Source tabs
  let html = `<div class="sub-tabs" style="margin-bottom:8px">
    <div class="sub-tab${itemSource==='bag'?' active':''}" onclick="itemSource='bag';openItemIdx=-1;renderContent()">背包</div>`;
  if (isPlayerHero && h.selfStorage) {
    html += `<div class="sub-tab${itemSource==='self'?' active':''}" onclick="itemSource='self';openItemIdx=-1;renderContent()">个人仓库</div>`;
  }
  if (isPlayerHero && saveData.save?.governStorage) {
    html += `<div class="sub-tab${itemSource==='govern'?' active':''}" onclick="itemSource='govern';openItemIdx=-1;renderContent()">官府仓库</div>`;
  }
  html += `</div>`;

  // Determine items and path based on source
  let items, basePath, money;
  if (itemSource === 'self' && isPlayerHero && h.selfStorage) {
    items = h.selfStorage.allItem || [];
    basePath = `${p}.selfStorage`;
    money = h.selfStorage.money || 0;
  } else if (itemSource === 'govern' && isPlayerHero && saveData.save?.governStorage) {
    items = saveData.save.governStorage.allItem || [];
    basePath = `saveData.save.governStorage`;
    money = saveData.save.governStorage.money || 0;
  } else {
    items = h.itemListData?.allItem || [];
    basePath = `${p}.itemListData`;
    money = h.itemListData?.money || 0;
    itemSource = 'bag';
  }

  const sourceLabel = itemSource === 'self' ? '个人仓库' : itemSource === 'govern' ? '官府仓库' : '背包';

  // Sort & filter controls
  html += `<div class="card"><div class="card-title">${sourceLabel} — 银两: <input type="number" value="${money}" style="width:100px;padding:3px 6px;background:#1a1a2e;border:1px solid #333;color:#e94560;border-radius:3px" onchange="setVal('${basePath}.money',parseInt(this.value))"> — 物品 ${items.length} 件</div>`;

  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
    <span style="font-size:11px;color:#666">类型:</span>`;
  Object.entries(ITEM_TYPES).forEach(([k,v]) => {
    const active = itemFilterTypes.has(k);
    html += `<span class="sub-tab${active?' active':''}" style="padding:2px 10px;font-size:11px;cursor:pointer" onclick="toggleItemFilter(itemFilterTypes,'${k}')">${v}</span>`;
  });
  html += `</div>`;

  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
    <span style="font-size:11px;color:#666">等級:</span>`;
  [5,4,3,2,1,0].forEach(lv => {
    const info = ITEM_LV[lv];
    if (!info) return;
    const label = info.itemName || info.name;
    const active = itemFilterLvs.has(String(lv));
    html += `<span class="sub-tab${active?' active':''}" style="padding:2px 10px;font-size:11px;cursor:pointer;${active?'':'color:'+info.color}" onclick="toggleItemFilter(itemFilterLvs,'${lv}')">${label}</span>`;
  });
  html += `</div>`;

  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
    <span style="font-size:11px;color:#666">品級:</span>`;
  [5,4,3,2,1,0].forEach(rv => {
    const info = RARE_LV_COLORS[rv] ? {name: RARE_LV_BY_TYPE[0]?.[rv] || `品${rv}`, color: RARE_LV_COLORS[rv]} : null;
    if (!info) return;
    const active = itemFilterRare.has(String(rv));
    html += `<span class="sub-tab${active?' active':''}" style="padding:2px 10px;font-size:11px;cursor:pointer;${active?'':'color:'+info.color}" onclick="toggleItemFilter(itemFilterRare,'${rv}')">${info.name}</span>`;
  });
  html += `</div>`;

  html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
    <span style="font-size:11px;color:#666">排序:</span>
    <select onchange="setItemSort(this.value);renderContent()" style="padding:3px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:12px">
      <option value="none" ${itemSortKey==='none'?'selected':''}>默认</option>
      <option value="type" ${itemSortKey==='type'?'selected':''}>类型</option>
      <option value="itemLv" ${itemSortKey==='itemLv'?'selected':''}>品级</option>
      <option value="value" ${itemSortKey==='value'?'selected':''}>价值</option>
      <option value="rareLv" ${itemSortKey==='rareLv'?'selected':''}>稀有度</option>
    </select>
    <button onclick="itemSortAsc=!itemSortAsc;renderContent()" class="item-edit-btn">${itemSortAsc?'↑ 升序':'↓ 降序'}</button>
    ${(itemFilterTypes.size||itemFilterLvs.size||itemFilterRare.size)?`<button onclick="clearItemFilters()" class="tag-remove">清除筛选</button>`:''}
  </div>`;

  if (!items.length) { html += '<p style="color:#666">无物品</p></div>'; return html; }

  // Build indexed list, filter, sort
  let indexed = items.map((it, i) => ({it, i}));
  if (itemFilterTypes.size) indexed = indexed.filter(({it}) => itemFilterTypes.has(String(it.type)));
  if (itemFilterLvs.size) indexed = indexed.filter(({it}) => itemFilterLvs.has(String(it.itemLv)));
  if (itemFilterRare.size) indexed = indexed.filter(({it}) => itemFilterRare.has(String(it.rareLv)));
  if (itemSortKey !== 'none') {
    indexed.sort((a, b) => {
      const va = a.it[itemSortKey] || 0, vb = b.it[itemSortKey] || 0;
      return itemSortAsc ? va - vb : vb - va;
    });
  }

  html += `<div style="font-size:11px;color:#555;margin-bottom:6px">显示 ${indexed.length} / ${items.length} 件</div>`;

  indexed.forEach(({it, i}) => {
    html += renderItemRow(it, i, `${basePath}.allItem`);
  });

  html += `</div>`;
  return html;
}

function renderItemRow(it, i, arrayPath) {
  const typeName = ITEM_TYPES[it.type] || it.type;
  const rarityName = getRarityName(it.type, it.rareLv);
  const rarityColor = getRarityColor(it.rareLv);
  const isOpen = openItemIdx === i;
  const ip = `${arrayPath}[${i}]`;
  const lvColor = getItemLvColor(it.itemLv);
  const lvName = getItemLvName(it.itemLv);

  let html = `<div class="item-row">
    <div class="item-summary" onclick="toggleItemEdit(${i})">
      <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${rarityColor};flex-shrink:0" title="${rarityName}"></span>
      <span class="item-name" style="color:${lvColor}">${it.name}</span>
      <span style="font-size:11px;color:#888">${typeName}</span>
      <span style="font-size:11px;color:${rarityColor}">${rarityName}</span>
      <span style="font-size:11px;color:${lvColor}">${lvName}</span>
      ${it.equipmentData?.equiped ? '<span class="tag tag-leader">装备中</span>' : ''}
      <button class="item-edit-btn">${isOpen ? '▲ 收起' : '▼ 编辑'}</button>
    </div>`;

  if (isOpen) {
    html += `<div class="item-detail open">`;
    html += `<div class="field-grid" style="margin-bottom:10px">
      ${field('名称','text',it.name,`${ip}.name`)}
      ${field('等级','number',it.itemLv,`${ip}.itemLv`)}
      ${field('品质(0-5)','number',it.rareLv,`${ip}.rareLv`)}
      ${field('价值','number',it.value,`${ip}.value`)}
      ${field('重量','number',r2(it.weight),`${ip}.weight`)}
      ${field('毒素','number',r2(it.poisonNum),`${ip}.poisonNum`)}
    </div>`;

    if (it.equipmentData) {
      const ed = it.equipmentData;
      html += `<div class="field-grid" style="margin-bottom:10px">
        ${field('强化等级','number',ed.enhanceLv,`${ip}.equipmentData.enhanceLv`)}
        ${field('特殊强化','number',ed.speEnhanceLv,`${ip}.equipmentData.speEnhanceLv`)}
        ${field('重量等级','number',ed.speWeightLv,`${ip}.equipmentData.speWeightLv`)}
      </div>`;
      html += `<div class="stat-section-title">基础属性 (黑字)</div>`;
      html += renderStatEditor(ed.baseAddData?.heroSpeAddData, `${ip}.equipmentData.baseAddData.heroSpeAddData`, i, 'base');
      html += `<div class="stat-section-title" style="color:#2ecc71">词条属性 (绿字)</div>`;
      html += renderStatEditor(ed.extraAddData?.heroSpeAddData, `${ip}.equipmentData.extraAddData.heroSpeAddData`, i, 'extra');
      if (ed.equipPoisonData && ed.equipPoisonData.poisonNum > 0) {
        html += `<div class="stat-section-title" style="color:#9b59b6">淬毒属性</div>`;
        html += `<div class="field-grid" style="margin-bottom:6px">
          ${field('毒素量','number',r2(ed.equipPoisonData.poisonNum),`${ip}.equipmentData.equipPoisonData.poisonNum`)}
        </div>`;
        html += renderStatEditor(ed.equipPoisonData?.poisonBuffData?.heroSpeAddData, `${ip}.equipmentData.equipPoisonData.poisonBuffData.heroSpeAddData`, i, 'poison');
      }
    }

    if (it.medFoodData) {
      const mf = it.medFoodData;
      html += `<div class="stat-section-title">药食效果</div>`;
      html += `<div class="field-grid" style="margin-bottom:6px">`;
      if (mf.changeHeroState) {
        const s = mf.changeHeroState;
        if (s.hp) html += field('回复生命','number',r2(s.hp),`${ip}.medFoodData.changeHeroState.hp`);
        if (s.mana) html += field('回复内力','number',r2(s.mana),`${ip}.medFoodData.changeHeroState.mana`);
        if (s.power) html += field('回复体力','number',r2(s.power),`${ip}.medFoodData.changeHeroState.power`);
        if (s.externalInjury) html += field('外伤治疗','number',r2(s.externalInjury),`${ip}.medFoodData.changeHeroState.externalInjury`);
        if (s.internalInjury) html += field('内伤治疗','number',r2(s.internalInjury),`${ip}.medFoodData.changeHeroState.internalInjury`);
        if (s.poisonInjury) html += field('解毒','number',r2(s.poisonInjury),`${ip}.medFoodData.changeHeroState.poisonInjury`);
      }
      html += `</div>`;
    }

    if (it.horseData) {
      const hd = it.horseData;
      html += `<div class="stat-section-title">坐骑属性</div>`;
      html += `<div class="field-grid">
        ${field('速度','number',r2(hd.speed),`${ip}.horseData.speed`)}
        ${field('力量','number',r2(hd.power),`${ip}.horseData.power`)}
        ${field('冲刺','number',r2(hd.sprint),`${ip}.horseData.sprint`)}

}

function renderStatEditor(statObj, path, itemIdx, section) {
  const entries = statObj ? Object.entries(statObj) : [];
  let html = '';

  entries.forEach(([key, val]) => {
    const statName = EQUIP_STAT_NAMES[key] || `未知(${key})`;
    const isPercent = statName.includes('%');
    const colorClass = section === 'extra' ? 'extra-stat' : section === 'poison' ? 'extra-stat' : 'base-stat';
    html += `<div class="stat-entry">
      <select onchange="renameStatKey('${path}','${key}',this.value,${itemIdx},'${section}')" class="${colorClass}">
        ${buildStatOptions(key)}
      </select>
      <input type="number" step="any" value="${val}" class="${colorClass}"
        onchange="setVal('${path}[\\'${key}\\']',parseFloat(this.value))">
      <span style="font-size:11px;color:#666">${isPercent && Math.abs(val) < 1 ? (r2(val*100))+'%' : ''}</span>
      <button class="stat-remove" onclick="removeStat('${path}','${key}',${itemIdx},'${section}')">✕</button>
    </div>`;
  });

  html += `<button class="stat-add-btn" onclick="addStat('${path}',${itemIdx},'${section}')">+ 添加属性</button>`;
  return html;
}

function buildStatOptions(selectedKey) {
  let html = '';
  const sortedIds = Object.keys(EQUIP_STAT_NAMES).map(Number).sort((a,b) => a - b);
  sortedIds.forEach(id => {
    html += `<option value="${id}" ${String(id)===String(selectedKey)?'selected':''}>${id}: ${EQUIP_STAT_NAMES[id]}</option>`;
  });
  return html;
}

function toggleItemEdit(idx) {
  openItemIdx = openItemIdx === idx ? -1 : idx;
  renderContent();
}

function addStat(path, itemIdx, section) {
  try {
    const obj = new Function('saveData', 'return ' + path)(saveData);
    // Find first unused stat ID
    const usedKeys = Object.keys(obj || {});
    let newKey = '0';
    for (let i = 0; i <= 214; i++) {
      if (!usedKeys.includes(String(i))) { newKey = String(i); break; }
    }
    new Function('saveData', path + '["' + newKey + '"] = 0;')(saveData);
    renderContent();
  } catch(e) { console.error('addStat error:', e); }
}

function removeStat(path, key, itemIdx, section) {
  try {
    new Function('saveData', 'delete ' + path + '["' + key + '"]')(saveData);
    renderContent();
  } catch(e) { console.error('removeStat error:', e); }
}

function renameStatKey(path, oldKey, newKey, itemIdx, section) {
  if (oldKey === newKey) return;
  try {
    const obj = new Function('saveData', 'return ' + path)(saveData);
    if (!obj) return;
    const val = obj[oldKey];
    delete obj[oldKey];
    obj[newKey] = val;
    renderContent();
  } catch(e) { console.error('renameStatKey error:', e); }
}

function resolveHeroName(id) {

function findHeroById(id) {
  if (id == null || id < 0) return null;
  return saveData.heroes.find(x => x && x.heroID === id)
      || saveData.tempHeroes.find(x => x && x.heroID === id);
}

// Relationship mirror mapping: when A has relation X with B, B should have relation Y with A
const REL_MIRROR = {
  Teacher: 'Students', Students: 'Teacher',
  Lover: 'Lover',
  Friends: 'Friends', Brothers: 'Brothers', Haters: 'Haters',
  Relatives: 'Relatives', PreLovers: 'PreLovers'
};

function addRelMirror(heroId, targetId, key) {
  const mirrorKey = REL_MIRROR[key];
  if (!mirrorKey) return;
  const target = findHeroById(targetId);
  if (!target) return;
  if (mirrorKey === 'Teacher') {
    // singular: set Teacher = heroId
    if (target.Teacher < 0 || target.Teacher === undefined) target.Teacher = heroId;
  } else if (mirrorKey === 'Lover') {
    if (target.Lover < 0 || target.Lover === undefined) target.Lover = heroId;
  } else {
    if (!target[mirrorKey]) target[mirrorKey] = [];
    if (!target[mirrorKey].includes(heroId)) target[mirrorKey].push(heroId);
  }
}

function removeRelMirror(heroId, targetId, key) {
  const mirrorKey = REL_MIRROR[key];
  if (!mirrorKey) return;
  const target = findHeroById(targetId);
  if (!target) return;
  if (mirrorKey === 'Teacher') {
    if (target.Teacher === heroId) target.Teacher = -1;
  } else if (mirrorKey === 'Lover') {
    if (target.Lover === heroId) target.Lover = -1;
  } else {
    if (target[mirrorKey]) {
      const idx = target[mirrorKey].indexOf(heroId);
      if (idx >= 0) target[mirrorKey].splice(idx, 1);
    }
  }
}

function setHeroFavor(heroId, value) {
  const h = findHeroById(heroId);
  if (h) h.favor = value;
}

function setSingularRelation(src, key, newId) {
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h) return;
  const oldId = h[key];
  // Remove mirror from old target
  if (oldId >= 0) removeRelMirror(h.heroID, oldId, key);
  h[key] = newId;
  // Add mirror to new target
  if (newId >= 0) addRelMirror(h.heroID, newId, key);
  renderContent();
}

function addRelation(src, key) {
  const input = document.getElementById('addRel_' + key);
  const id = parseInt(input?.value);
  if (isNaN(id) || id < 0) { toast('请输入有效英雄ID', true); return; }
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h) return;
  if (!h[key]) h[key] = [];
  if (h[key].includes(id)) { toast('已存在该关系', true); return; }
  h[key].push(id);
  addRelMirror(h.heroID, id, key);
  toast(`已添加${resolveHeroName(id)||id}为${key}（双向同步）`);
  renderContent();
}

function removeRelation(src, key, idx) {
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h || !h[key]) return;
  const removed = h[key].splice(idx, 1)[0];
  removeRelMirror(h.heroID, removed, key);
  toast(`已移除: ${resolveHeroName(removed)||removed}（双向同步）`);
  renderContent();
}

function moveRelation(src, fromKey, idx, toKey) {
  if (!toKey) return;
  const list = src === 'heroes' ? saveData.heroes : saveData.tempHeroes;
  const h = list[selectedIndex];
  if (!h || !h[fromKey]) return;
  const id = h[fromKey].splice(idx, 1)[0];
  removeRelMirror(h.heroID, id, fromKey);
  if (!h[toKey]) h[toKey] = [];
  if (!h[toKey].includes(id)) h[toKey].push(id);
  addRelMirror(h.heroID, id, toKey);
  toast(`已将${resolveHeroName(id)||id}从${fromKey}移至${toKey}（双向同步）`);
  renderContent();
}
