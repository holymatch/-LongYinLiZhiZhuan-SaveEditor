function renderAreaBuildings(a, ap) {
  const tiles = a.areaTiles || [];
  const w = a.mapWidth || 13;
  const h = a.mapHeight || 13;
  const GD = (typeof GameData !== 'undefined') ? GameData : {};
  const BNAME = GD.BUILDING_ID_TO_NAME || {};
  const BICON = GD.BUILDING_ICONS || {};
  const BCAT = GD.SECT_BUILDING_CATEGORIES || {};
  const specialBldId = (GD.SECT_SPECIAL_BUILDING || {})[a.belongForceID];

  const allBuildings = [];
  const allRoads = [];
  tiles.forEach((t, idx) => {
    if (t.building && t.building.buildingID !== undefined && t.building.buildingID >= 0) {
      allBuildings.push({ tile: t, idx, row: t.row, col: t.column, b: t.building });
    }
    if ((t.tileType === 1 || t.tileType === 2) && t.areaRoadData) {
      allRoads.push(idx);
    }
  });

  // Batch controls
  let html = `<div class="card"><div class="card-title">门派地图 — ${a.areaName} (${w}×${h})</div>`;
  html += `<div class="batch-bar">
    <span style="color:#888;font-size:12px">批量操作:</span>
    <button onclick="batchSetBuildingLv('${ap}', ${JSON.stringify(allBuildings.map(b=>b.idx))}, 10)">全部建筑满级</button>
    <button onclick="batchSetRoadLv('${ap}', ${JSON.stringify(allRoads)}, 10)">全部道路满级</button>
    <button onclick="batchSetBuildingLv('${ap}', ${JSON.stringify(allBuildings.map(b=>b.idx))}, 10);batchSetRoadLv('${ap}', ${JSON.stringify(allRoads)}, 10)">全部满级</button>
    <select onchange="if(this.value) { batchSetBuildingLv('${ap}', ${JSON.stringify(allBuildings.map(b=>b.idx))}, parseInt(this.value)); this.value=''; }">
      <option value="">设置建筑等级...</option>
      <option value="1">等级 1</option><option value="2">等级 2</option><option value="3">等级 3</option>
      <option value="4">等级 4</option><option value="5">等级 5</option><option value="6">等级 6</option>
      <option value="7">等级 7</option><option value="8">等级 8</option><option value="9">等级 9</option><option value="10">等级 10</option>
    </select>
  </div>`;

  // Grid map
  html += `<div class="sect-map-wrap">`;
  html += `<div class="sect-map-grid-wrap">`;
  html += `<div class="sect-map-grid" style="grid-template-columns:repeat(${w}, 42px);">`;

  for (let r = h - 1; r >= 0; r--) {
    for (let c = 0; c < w; c++) {
      const tIdx = r * w + c;
      const t = tiles[tIdx];
      if (!t) { html += `<div class="sect-map-cell cell-outside"></div>`; continue; }

      const tt = t.tileType;
      const b = (t.building && t.building.buildingID >= 0) ? t.building : null;
      const emptySlot = (t.building && t.building.buildingID === -1) ? t.building : null;
      const isWhite = (t.spriteName === 'Tile_WhiteGround');
      const isGray = (t.spriteName === 'Tile_GrayGround');

      let cls = 'sect-map-cell';
      if (tt === -3) { cls += ' cell-outside'; }
      else if (tt === -2) { cls += ' cell-wall'; }
      else if (tt === -1) { cls += isWhite ? ' cell-border-white' : ' cell-border'; }
      else if (tt === 1) { cls += ' cell-road'; }
      else if (tt === 2 && b && b.buildingID === 0) { cls += ' cell-ground cell-core'; }
      else if (tt === 2) { cls += ' cell-gate'; }
      else if (tt === 0 && !b && !emptySlot) { cls += ' cell-wild'; }
      else if (tt === 0 && emptySlot && emptySlot.lv === 0) { cls += ' cell-cleared'; }
      else if (tt === 0 && emptySlot) { cls += isWhite ? ' cell-foundation-w' : ' cell-foundation-g'; }
      else { cls += isWhite ? ' cell-ground-white' : ' cell-ground'; }

      if (b) {
        cls += ' has-building';
        if (b.buildingID === 0) cls += ' cell-core';
        else if (specialBldId !== undefined && b.buildingID === specialBldId) cls += ' cell-special';
      }

      const hasRoad = (tt === 1 || tt === 2) && t.areaRoadData;
      const clickable = b || tt === 0 || hasRoad;
      const selAttr = clickable ? ` onclick="selectMapBuilding(${tIdx},'${ap}')"` : '';
      const selCls = (typeof window._selectedMapTile !== 'undefined' && window._selectedMapTile === tIdx) ? ' cell-selected' : '';

      html += `<div class="${cls}${selCls}" data-tidx="${tIdx}"${selAttr}>`;
      if (b) {
        const icon = BICON[b.buildingID] || '🏗️';
        html += `<span class="cell-icon">${icon}</span>`;
        if (b.lv > 0) html += `<span class="cell-lv">${b.lv}</span>`;
      } else if (emptySlot) {
        if (emptySlot.lv > 0) html += `<span class="cell-lv" style="color:#8a8a6a">基${emptySlot.lv}</span>`;
        else html += `<span style="color:#555;font-size:8px">◇</span>`;
      } else if (tt === 0) {
        html += `<span style="color:#3a5a3a;font-size:10px">🌿</span>`;
      } else if (tt === -2) {
        html += `<span class="cell-icon">🚪</span>`;
      } else if (tt === 1 && t.areaRoadData) {
        const rlv = t.areaRoadData.roadLv || 0;
        html += `<span style="color:#6a6a3a;font-size:8px">━</span>`;
        if (rlv > 0) html += `<span class="cell-lv" style="color:#8a7a3a">${rlv}</span>`;
      } else if (tt === 1) {
        html += `<span style="color:#6a6a3a;font-size:8px">━</span>`;
      }
      html += `</div>`;
    }
  }
  html += `</div>`; // grid

  // Legend
  html += `<div class="map-legend">
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#1a3020"></div>🌿 荒地</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#2a2a1a"></div>地基(灰)</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#2a2a2e"></div>地基(白)</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#1a2744"></div>建筑</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#2a2a1a;border-color:#6a6a3a"></div>道路</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:#2c1a1a"></div>围墙</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:linear-gradient(135deg,#3a1a2e,#2a1a3e)"></div>正厅</div>
    <div class="map-legend-item"><div class="map-legend-swatch" style="background:linear-gradient(135deg,#1a2a3e,#1a3a2e)"></div>特殊建筑</div>
  </div>`;
  html += `</div>`; // grid-wrap

  // Detail panel
  html += `<div class="bld-detail" id="bldDetailPanel">`;
  html += renderBuildingDetail(a, ap, tiles, BNAME, BICON, specialBldId);
  html += `</div>`;

  html += `</div>`; // sect-map-wrap
  html += `</div>`; // card

  // Building list table (collapsible)
  html += `<div class="card">
    <div class="card-title" style="cursor:pointer" onclick="document.getElementById('bldListBody').style.display=document.getElementById('bldListBody').style.display==='none'?'':'none'">
      建筑列表 (${allBuildings.length}) <span style="font-size:12px;color:#666">▼ 点击展开</span>
    </div>
    <div id="bldListBody" style="display:none" class="bld-list-table">
      <table class="item-table"><thead><tr>
        <th>图标</th><th>名称</th><th>位置</th><th>等级</th><th>产出率</th><th>存储率</th>
      </tr></thead><tbody>`;
  allBuildings.sort((a,b) => a.b.buildingID - b.b.buildingID).forEach(({b, idx, row, col}) => {
    const name = BNAME[b.buildingID] || `建筑${b.buildingID}`;
    const icon = BICON[b.buildingID] || '🏗️';
    html += `<tr style="cursor:pointer" onclick="selectMapBuilding(${idx},'${ap}')">
      <td>${icon}</td><td>${name}</td><td>(${row},${col})</td>
      <td><input type="number" min="0" max="10" value="${b.lv}" style="width:50px"
        onclick="event.stopPropagation()"
        onchange="setVal('${ap}.areaTiles[${idx}].building.lv',parseInt(this.value));renderContent()"></td>
      <td>${r2(b.produceRate)}</td><td>${r2(b.resourceStoreRate)}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  return html;
}

function renderBuildingDetail(a, ap, tiles, BNAME, BICON, specialBldId) {
  const tIdx = (typeof window._selectedMapTile !== 'undefined') ? window._selectedMapTile : -1;
  if (tIdx < 0 || !tiles[tIdx]) {
    return `<div class="card"><div class="card-title">建筑详情</div>
      <p style="color:#666;font-size:13px">← 点击地图上的格子查看详情</p></div>`;
  }
  const t = tiles[tIdx];
  const b = (t.building && t.building.buildingID >= 0) ? t.building : null;
  const emptySlot = (t.building && t.building.buildingID === -1) ? t.building : null;
  const isWhite = (t.spriteName === 'Tile_WhiteGround');
  const spriteLabel = isWhite ? '白地' : '灰地';

  // === Road tile ===
  if ((t.tileType === 1 || t.tileType === 2) && t.areaRoadData && !b) {
    const rd = t.areaRoadData;
    let html = `<div class="card"><div class="card-title">━ 道路</div>
      <div style="font-size:13px;color:#aaa;margin-bottom:10px">
        <span>位置: (${t.row}, ${t.column})</span> ·
        <span>类型: ${t.tileType === 2 ? '大门' : '道路'}</span>
      </div>
      <div style="background:#1a1a2e;border-radius:6px;padding:10px;margin-bottom:10px;border:1px solid #333">
        <div style="font-size:12px;color:#888;margin-bottom:6px">道路属性</div>
        <div style="margin-bottom:8px"><label style="font-size:12px;color:#888">道路等级</label>
          <div class="bld-lv-stars">`;
    for (let lv = 0; lv <= 10; lv++) {
      html += `<div class="bld-lv-star${rd.roadLv === lv ? ' active' : ''}"
        onclick="setVal('${ap}.areaTiles[${tIdx}].areaRoadData.roadLv',${lv});renderContent()"
        title="等级 ${lv}">${lv}</div>`;
    }
    html += `</div></div>
        <div class="field-grid" style="grid-template-columns:1fr 1fr">
          ${field('升级剩余', 'number', rd.upgradeTimeLeft, `${ap}.areaTiles[${tIdx}].areaRoadData.upgradeTimeLeft`)}
        </div>
      </div>
    </div>`;
    return html;
  }

  // === Empty slot (buildingID=-1, has foundation data) ===
  if (!b && emptySlot) {
    const groundType = emptySlot.lv > 0 ? '地基' : '废墟';
    const groundIcon = emptySlot.lv > 0 ? '🧱' : '◇';
    let html = `<div class="card"><div class="card-title">${groundIcon} ${groundType}</div>
      <div style="font-size:13px;color:#aaa;margin-bottom:10px">
        <span>位置: (${t.row}, ${t.column})</span> ·
        <span>地面: ${spriteLabel}</span> ·
        <span>类型: tileType=${t.tileType}</span>
      </div>
      <div style="background:#1a1a2e;border-radius:6px;padding:10px;margin-bottom:10px;border:1px solid #333">
        <div style="font-size:12px;color:#888;margin-bottom:6px">地基属性</div>
        <div class="field-grid" style="grid-template-columns:1fr 1fr">
          ${field('地基等级', 'number', emptySlot.lv, `${ap}.areaTiles[${tIdx}].building.lv`)}
          ${field('产出率', 'number', r2(emptySlot.produceRate), `${ap}.areaTiles[${tIdx}].building.produceRate`)}
          ${field('存储率', 'number', r2(emptySlot.resourceStoreRate), `${ap}.areaTiles[${tIdx}].building.resourceStoreRate`)}
        </div>
      </div>
      <div style="margin-top:8px">
        <label style="font-size:12px;color:#888">放置建筑:</label>
        <select style="margin-top:4px;width:100%;padding:5px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:13px"
          onchange="placeBuilding(${tIdx},'${ap}',parseInt(this.value))">
          <option value="-1">选择建筑...</option>
          ${Object.entries(BNAME).map(([id,name]) => `<option value="${id}">${BICON[id]||'🏗️'} ${name}</option>`).join('')}
        </select>
      </div>
    </div>`;
    return html;
  }

  // === Raw wild ground (building=null) ===
  if (!b && !emptySlot) {
    return `<div class="card"><div class="card-title">🌿 荒地</div>
      <div style="font-size:13px;color:#aaa;margin-bottom:10px">
        <span>位置: (${t.row}, ${t.column})</span> ·
        <span>地面: ${spriteLabel}</span> ·
        <span>类型: tileType=${t.tileType}</span>
      </div>
      <p style="color:#666;font-size:12px;margin-bottom:10px">未开发的荒地，无地基数据。</p>
      <div style="margin-top:8px">
        <label style="font-size:12px;color:#888">放置建筑:</label>
        <select style="margin-top:4px;width:100%;padding:5px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:13px"
          onchange="placeBuilding(${tIdx},'${ap}',parseInt(this.value))">
          <option value="-1">选择建筑...</option>
          ${Object.entries(BNAME).map(([id,name]) => `<option value="${id}">${BICON[id]||'🏗️'} ${name}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }

  // === Has a real building ===
  const name = BNAME[b.buildingID] || `建筑${b.buildingID}`;
  const icon = BICON[b.buildingID] || '🏗️';
  const isCore = b.buildingID === 0;
  const isSpecial = specialBldId !== undefined && b.buildingID === specialBldId;

  let html = `<div class="card">
    <div class="bld-detail-header">
      <span class="bld-detail-icon">${icon}</span>
      <div>
        <div class="bld-detail-name">${name}${isCore ? ' <span style="font-size:11px;color:#ffd700">★ 核心</span>' : ''}${isSpecial ? ' <span style="font-size:11px;color:#2ecc71">✦ 特殊</span>' : ''}</div>
        <div class="bld-detail-pos">位置 (${t.row}, ${t.column}) · ID: ${b.buildingID} · ${spriteLabel}</div>
      </div>
    </div>`;

  // Level stars
  html += `<div style="margin-bottom:12px"><label style="font-size:12px;color:#888">建筑等级</label>
    <div class="bld-lv-stars">`;
  for (let lv = 0; lv <= 10; lv++) {
    html += `<div class="bld-lv-star${b.lv === lv ? ' active' : ''}"
      onclick="setVal('${ap}.areaTiles[${tIdx}].building.lv',${lv});renderContent()"
      title="等级 ${lv}">${lv}</div>`;
  }
  html += `</div></div>`;

  // Editable fields
  html += `<div class="field-grid" style="grid-template-columns:1fr 1fr">
    ${field('产出率', 'number', r2(b.produceRate), `${ap}.areaTiles[${tIdx}].building.produceRate`)}
    ${field('存储率', 'number', r2(b.resourceStoreRate), `${ap}.areaTiles[${tIdx}].building.resourceStoreRate`)}
    ${field('建造剩余', 'number', b.buildTimeLeft, `${ap}.areaTiles[${tIdx}].building.buildTimeLeft`)}
    ${field('升级剩余', 'number', b.upgradeTimeLeft, `${ap}.areaTiles[${tIdx}].building.upgradeTimeLeft`)}
    ${field('拆除剩余', 'number', b.destroyTimeLeft, `${ap}.areaTiles[${tIdx}].building.destroyTimeLeft`)}
  </div>`;

  // Change building type
  if (!isCore) {
    html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid #333">
      <label style="font-size:12px;color:#888">更换建筑类型</label>
      <select style="margin-top:4px;width:100%;padding:5px 8px;background:#1a1a2e;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:13px"
        onchange="changeBuildingType(${tIdx},'${ap}',parseInt(this.value))">
        ${Object.entries(BNAME).map(([id,n]) => `<option value="${id}"${parseInt(id)===b.buildingID?' selected':''}>${BICON[id]||'🏗️'} ${n}</option>`).join('')}
      </select>
    </div>`;
  }

  // Remove building
  if (!isCore) {
    html += `<div style="margin-top:12px">
      <button style="padding:5px 14px;background:#5a1a1a;border:1px solid #8a2a2a;border-radius:4px;color:#e94560;cursor:pointer;font-size:12px;font-family:inherit"
        onclick="if(confirm('确定移除此建筑？')) { removeBuilding(${tIdx},'${ap}'); }">🗑 移除建筑</button>
    </div>`;
  }

  html += `</div>`;
  return html;
}

// Map interaction functions
function selectMapBuilding(tIdx, ap) {
  window._selectedMapTile = tIdx;
  renderContent();
}

function selectEmptyTile(tIdx, ap) {
  window._selectedMapTile = tIdx;
  renderContent();
}

function batchSetBuildingLv(ap, indices, lv) {
  indices.forEach(idx => {
    try { setVal(`${ap}.areaTiles[${idx}].building.lv`, lv); } catch(e) {}
  });
  toast(`已将 ${indices.length} 个建筑设为等级 ${lv}`);
  renderContent();
}

function batchSetRoadLv(ap, indices, lv) {
  indices.forEach(idx => {
    try { setVal(`${ap}.areaTiles[${idx}].areaRoadData.roadLv`, lv); } catch(e) {}
  });
  toast(`已将 ${indices.length} 条道路设为等级 ${lv}`);
  renderContent();
}

function changeBuildingType(tIdx, ap, newId) {
  setVal(`${ap}.areaTiles[${tIdx}].building.buildingID`, newId);
  toast(`已更换建筑为 ${(typeof GameData !== 'undefined' && GameData.BUILDING_ID_TO_NAME) ? GameData.BUILDING_ID_TO_NAME[newId] || newId : newId}`);
  renderContent();
}

function placeBuilding(tIdx, ap, buildingId) {
  if (buildingId < 0) return;
  const path = `${ap}.areaTiles[${tIdx}]`;
  try {
    const tile = new Function('saveData', `return ${path}`)(saveData);
    if (!tile.building) {
      tile.building = {
        buildingID: buildingId, lv: 1, buildTimeLeft: 0, upgradeTimeLeft: 0,
        destroyTimeLeft: 0, noCancel: false,
        shopItemList: { heroID: -1, forceID: -1, money: 0, weight: 0, maxWeight: -1, allItem: [] },
        missionDatas: [], produceRate: 1, resourceStoreRate: 1,
        areaID: tile.areaID, belongHeroID: -1, missionNumCount: 0, plotNumCount: 0, enemyMonth: 0
      };
    } else {
      tile.building.buildingID = buildingId;
      tile.building.lv = 1;
    }
    window._selectedMapTile = tIdx;
    toast(`已放置 ${(typeof GameData !== 'undefined' && GameData.BUILDING_ID_TO_NAME) ? GameData.BUILDING_ID_TO_NAME[buildingId] || buildingId : buildingId}`);
    renderContent();
  } catch(e) { console.error('placeBuilding error:', e); }
}

function removeBuilding(tIdx, ap) {
  const path = `${ap}.areaTiles[${tIdx}]`;
  try {
    const tile = new Function('saveData', `return ${path}`)(saveData);
    tile.building = null;
    window._selectedMapTile = -1;
    toast('已移除建筑');
    renderContent();
  } catch(e) { console.error('removeBuilding error:', e); }
}

function renderAreaMissions(a) {
  const tiles = a.areaTiles || [];
  let missions = [];
  tiles.forEach(t => {
    if (t.building?.missionDatas) {
      t.building.missionDatas.forEach(m => missions.push(m));
    }
  });
  let html = `<div class="card"><div class="card-title">悬赏任务 (${missions.length})</div>`;
  if (!missions.length) { html += '<p style="color:#666">无悬赏</p></div>'; return html; }

  missions.forEach(m => {
    html += `<div style="padding:8px;border-bottom:1px solid #222">
      <div style="font-size:14px;color:#e94560">${m.name}</div>
      <div style="font-size:12px;color:#888;margin-top:4px">
        难度: ${r2(m.difficulty)} | 剩余天数: ${m.leftTime} | 名望奖励: ${r2(m.missionFameReward)} | 银两奖励: ${m.missionMoneyReward}
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderPlayerForceContribution() {
  const forces = saveData.save?.Forces || [];
  if (!forces.length) return '<div class="card"><div class="card-title">门派功绩</div><p style="color:#666">无门派数据</p></div>';

  let html = `<div class="card"><div class="card-title">门派功绩 (${forces.length})</div>
    <table class="item-table"><thead><tr>
      <th>门派</th><th>风格</th><th>等级</th><th>掌门</th><th>玩家功绩</th>
    </tr></thead><tbody>`;

  forces.forEach((f, i) => {
    const fp = `saveData.save.Forces[${i}]`;
    const leaderHero = resolveHeroName(f.leader);
    const leaderDisplay = leaderHero ? `${leaderHero}(${f.leader})` : f.leader;
    html += `<tr>
      <td style="color:${getForceColor(f.forceID)}">${f.forceName}</td>
      <td>${f.forceStyle || ''}</td>
      <td>${f.forceLv || 0}</td>
      <td style="font-size:12px">${leaderDisplay}</td>
      <td><input type="number" step="any" value="${r2(f.playerOutForceContribution || 0)}"
        onchange="setVal('${fp}.playerOutForceContribution',parseFloat(this.value)||0)"></td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

// ===== HELPERS =====
function getAreaType(areaID) {
  if (!saveData.save) return -1;
  if (saveData.save.cityAreaID?.includes(areaID)) return 0;
  if (saveData.save.villageAreaID?.includes(areaID)) return 1;
  if (saveData.save.forceAreaID?.includes(areaID)) return 2;
  return -1;
}

function r2(v) { return v == null ? 0 : Math.round(v * 100) / 100; }

function field(label, type, value, path, options) {
  if (type === 'select' && options) {
    const opts = options.map(o =>
      `<option value="${o.v}" ${value===o.v?'selected':''}>${o.l}</option>`).join('');
    return `<div class="field"><label>${label}</label>
      <select onchange="setVal('${path}',this.value==='true'?true:this.value==='false'?false:this.value)">${opts}</select></div>`;
  }
  const step = type === 'number' ? ' step="any"' : '';
  return `<div class="field"><label>${label}</label>
    <input type="${type}" value="${value ?? ''}"${step}
      onchange="setVal('${path}',${type==='number'?'parseFloat(this.value)||0':'this.value'})"></div>`;
}

function fieldSelect(label, value, path, options) {
  const opts = options.map(o =>
    `<option value="${o.v}" ${value===o.v||String(value)===String(o.v)?'selected':''}>${o.l}</option>`).join('');
  return `<div class="field"><label>${label}</label>
    <select onchange="setVal('${path}',parseInt(this.value))">${opts}</select></div>`;
}

function setVal(path, value) {
  try { new Function('saveData','v', path + '= v;')(saveData, value); }
  catch(e) { console.error('setVal error:', path, e); }
}

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}
</script>
</body>
</html>
